<!DOCTYPE html>
<html>
    <head>
        <title>dynatype</title>
        <script src="logic.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <section id="homescreen" class="current_screen">
            <button id="begin">BEGIN GAME</button>
        </section>

        <section id="levelscreen" class="hidden_screen">

                <button data-level="1" class="level_button">LEVEL 1</button>
                <button data-level="2" class="level_button">LEVEL 2</button>
                <button data-level="3" class="level_button">LEVEL 3</button>

        </section>
        
        <section id="gamescreen" class="hidden_screen">
            <h1 id="quote">KNOW THE KEYBOARD</h1>
            <div id="display"></div>
            <div id="buttons">
                <button id="start">
                    START
                </button>

                <button id="finish">
                    FINISH
                </button>
            </div>


            <h2 id="dt">dynatype</h2>
        </section>

        <section id="statscreen" class="hidden_screen">

            <h2>total keystrokes :  <span id="total_ks">0<span></h2>
            <h2>correct : <span id="correct_ks">0<span></h2>
            <h2>wrong : <span id="wrong_ks">0<span></h2>

        </section>
    </body>

</html>
